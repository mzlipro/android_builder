name: android_build-ceshi

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # -------------------------------------------------
      # 1️⃣ 检出本仓库（只包含 workflow 本身）
      # -------------------------------------------------
      - name: Checkout workflow repo
        uses: actions/checkout@v4

      # -------------------------------------------------
      # 2️⃣ 读取需要克隆的项目地址
      # -------------------------------------------------
      - id: get-project
        name: Get project name
        run: |
          PROJECT=$(cat project-to-build)
          echo "PROJECT=$PROJECT" >> "$GITHUB_OUTPUT"

      # -------------------------------------------------
      # 3️⃣ 克隆目标 Android 项目
      # -------------------------------------------------
      - name: Clone target project
        run: |
          REPO="${{ steps.get-project.outputs.PROJECT }}"
          # 若文件里只有 owner/repo，需要补全协议前缀
          if [[ "$REPO" != http* ]]; then
            REPO="https://github.com/$REPO"
          fi
          git clone --depth=1 "$REPO" project

      # -------------------------------------------------
      # 4️⃣ 配置 JDK（此时 project 已经在工作区，Gradle 文件可见）
      # -------------------------------------------------
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle            # 启用 Gradle 缓存
          # cache-dependency-path: project/**/*.gradle*   # 可选显式指定路径

      # -------------------------------------------------
      # 5️⃣ 编译 Android APK
      # -------------------------------------------------
      - name: Build the app
        working-directory: ./project
        run: |
          # 若已有 gradlew，直接使用；若没有则生成 wrapper
          if [ ! -f "./gradlew" ]; then
            ./gradlew wrapper
          fi
          chmod +x ./gradlew
          ./gradlew assembleDebug --stacktrace

      # -------------------------------------------------
      # 6️⃣ 上传 APK
      # -------------------------------------------------
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-build-apk
          path: ./project/**/*.apk
