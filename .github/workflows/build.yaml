name: android_build-ceshi
on:
  workflow_dispatch:

permissions:
  contents: read   # 让 GITHUB_TOKEN 具备读取代码的最小权限

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4   # 检出本仓库
        with:
          clean: true

      # 读取项目名（只写 owner/repo，大小写必须和仓库实际一致）
      - id: get-project
        run: |
          PROJECT=$(cat project-to-build)   # 例如 mzlipro/webhtvtest
          echo "PROJECT=$PROJECT" >> "$GITHUB_OUTPUT"

      # 用默认 token 克隆目标仓库
      - name: Clone target project (same org)
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.get-project.outputs.PROJECT }}
          token: ${{ secrets.GITHUB_TOKEN }}   # 自动注入的同组织 token
          path: project
          fetch-depth: 1

      # ……后面的 Python、JDK、构建步骤保持不变
                       # 与原来的 --depth=1 等价

      # 4️⃣ 安装 Python 3.10（Chaquopy 编译依赖）
      - name: Install Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      # 5️⃣ 安装 JDK（Gradle 缓存）
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      # 6️⃣ 为 Chaquopy 指定 Python
      - name: Set Chaquopy python env
        run: echo "CHAQUO_PYTHON_BUILD=/usr/bin/python3.10" >> "$GITHUB_ENV"

      # 7️⃣ 构建 Debug APK
      - name: Build the app
        working-directory: ./project
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --stacktrace --no-daemon

      # 8️⃣ 上传生成的 APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: ./project/**/*.apk
